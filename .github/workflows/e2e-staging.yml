name: E2E Staging

on:
  workflow_dispatch:

jobs:
  e2e-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Validate staging URL secret
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
        run: |
          if [ -z "$PLAYWRIGHT_BASE_URL" ]; then
            echo "Missing STAGING_BASE_URL secret."
            exit 1
          fi

      - name: Run Playwright E2E against staging
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
        run: npm run test:e2e
